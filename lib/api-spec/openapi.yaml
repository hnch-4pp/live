openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Hunches - Prediction platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: hunches
    description: Hunch prediction markets
  - name: categories
    description: Hunch categories
  - name: auth
    description: Authentication
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
        '500':
          description: Failed to generate upload URL.
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /hunches:
    get:
      operationId: listHunches
      tags: [hunches]
      summary: List all hunches
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category slug
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, resolved]
          description: Filter by status
        - name: featured
          in: query
          schema:
            type: boolean
          description: Filter featured hunches only
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: q
          in: query
          schema:
            type: string
          description: Full-text search query on hunch titles
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by tag slug (e.g. world-cup)
        - name: lang
          in: query
          schema:
            type: string
          description: Language code for content translation (e.g. es, fr, de)
      responses:
        "200":
          description: List of hunches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HunchList"

  /trending-topics:
    get:
      operationId: listTrendingTopics
      tags: [hunches]
      summary: List active trending topics
      responses:
        "200":
          description: Trending topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingTopic"

  /hunches/featured:
    get:
      operationId: getFeaturedHunches
      tags: [hunches]
      summary: Get featured hunches for hero section
      parameters:
        - name: lang
          in: query
          schema:
            type: string
          description: Language code for content translation
      responses:
        "200":
          description: Featured hunches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hunch"

  /hunches/stats:
    get:
      operationId: getHunchStats
      tags: [hunches]
      summary: Get platform-wide stats
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /hunches/{id}:
    get:
      operationId: getHunch
      tags: [hunches]
      summary: Get a single hunch by numeric ID or slug
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: lang
          in: query
          schema:
            type: string
          description: Language code for content translation
      responses:
        "200":
          description: Hunch detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hunch"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /hunches/{id}/winners:
    get:
      operationId: getHunchWinners
      tags: [hunches]
      summary: Get winners for a resolved hunch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of winners
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HunchWinnerList"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /hunches/{id}/predict:
    post:
      operationId: submitPrediction
      tags: [hunches]
      summary: Submit a prediction on a hunch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictionInput"
      responses:
        "201":
          description: Prediction submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prediction"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all hunch categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Category:
      type: object
      required: [id, slug, name, icon, hunchCount]
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        icon:
          type: string
        hunchCount:
          type: integer
        color:
          type: string

    Prize:
      type: object
      required: [id, label, type, value]
      properties:
        id:
          type: integer
        label:
          type: string
        type:
          type: string
          enum: [gift_card, merch, cash_equivalent]
        value:
          type: string
        imageUrl:
          type: ["string", "null"]

    PrizeTier:
      type: object
      required: [rank, prize]
      properties:
        rank:
          type: integer
        prize:
          $ref: "#/components/schemas/Prize"

    Hunch:
      type: object
      required: [id, slug, title, description, categorySlug, categoryName, status, participantCount, endsAt, prize, options, prizeTiers]
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        description:
          type: string
        categorySlug:
          type: string
        categoryName:
          type: string
        categoryColor:
          type: string
        status:
          type: string
          enum: [open, closed, resolved]
        participantCount:
          type: integer
        endsAt:
          type: string
          format: date-time
        resolvedAt:
          type: ["string", "null"]
        prize:
          $ref: "#/components/schemas/Prize"
        prizeTiers:
          type: array
          items:
            $ref: "#/components/schemas/PrizeTier"
        prizePoolTotal:
          type: ["string", "null"]
        options:
          type: array
          items:
            $ref: "#/components/schemas/HunchOption"
        featured:
          type: boolean
        imageUrl:
          type: ["string", "null"]
        imageFocalPoint:
          type: ["string", "null"]
        winnerOption:
          type: ["string", "null"]
        resultText:
          type: ["string", "null"]
          description: Admin-written summary of the outcome shown after resolution
        resultSources:
          type: ["string", "null"]
          description: JSON array of source objects [{type,url,label}]
        rules:
          type: ["string", "null"]
        prizeConditions:
          type: ["string", "null"]
          description: Optional terms or conditions for the prizes shown to participants
        ticketCost:
          type: integer
        answerType:
          type: string
        isMulti:
          type: boolean
        tags:
          type: ["string", "null"]
          description: Comma-separated tag slugs (e.g. world-cup,tennis)

    TrendingTopic:
      type: object
      required: [id, name, tag, sortOrder, active]
      properties:
        id:
          type: integer
        name:
          type: string
        tag:
          type: string
        imageUrl:
          type: ["string", "null"]
        sortOrder:
          type: integer
        active:
          type: boolean

    HunchOption:
      type: object
      required: [id, label, percentage]
      properties:
        id:
          type: integer
        label:
          type: string
        percentage:
          type: number

    HunchList:
      type: object
      required: [hunches, total]
      properties:
        hunches:
          type: array
          items:
            $ref: "#/components/schemas/Hunch"
        total:
          type: integer

    PlatformStats:
      type: object
      required: [totalHunches, totalParticipants, totalPrizesAwarded, activeHunches]
      properties:
        totalHunches:
          type: integer
        totalParticipants:
          type: integer
        totalPrizesAwarded:
          type: integer
        activeHunches:
          type: integer

    PredictionAnswer:
      type: object
      required: [questionId, freeText]
      properties:
        questionId:
          type: integer
        freeText:
          type: string
          minLength: 1
          maxLength: 200

    PredictionInput:
      type: object
      properties:
        freeText:
          type: string
          minLength: 1
          maxLength: 200
        answers:
          type: array
          items:
            $ref: '#/components/schemas/PredictionAnswer'

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. image/jpeg).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath, publicUrl]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned R2 URL for PUT upload (expires in 15 min).
        objectPath:
          type: string
          description: Internal object path stored in DB (e.g. /objects/uploads/uuid.jpg).
        publicUrl:
          type: string
          format: uri
          description: Direct public R2 URL to serve the uploaded file.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    HunchWinner:
      type: object
      required: [username, prizeLabel, prizeValue]
      properties:
        username:
          type: string
        prizeLabel:
          type: string
        prizeValue:
          type: string
        rank:
          type: ["integer", "null"]

    HunchWinnerList:
      type: object
      required: [winners]
      properties:
        winners:
          type: array
          items:
            $ref: "#/components/schemas/HunchWinner"

    Prediction:
      type: object
      required: [id, hunchId, optionId, optionLabel, createdAt]
      properties:
        id:
          type: integer
        hunchId:
          type: integer
        optionId:
          type: integer
        optionLabel:
          type: string
        createdAt:
          type: string
          format: date-time
